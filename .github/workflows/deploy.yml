name: Deploy Webapp with DB Migration
on:
  push:
    branches: [master]

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Database Migration
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
        run: node migrate.mjs

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: team_aPUhOuBeCqxGb2Ai5YNaJMQA
          VERCEL_PROJECT_ID: prj_0ajhOzkQEEvTqXaPN522y2XZfwdV
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
